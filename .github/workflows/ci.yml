name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install test dependencies
        run: |
          pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu
          pip install \
            "fastapi>=0.135.0" "uvicorn[standard]" "python-multipart>=0.0.24" \
            "pillow>=12.0.0" "numpy" "pandas" "loguru" "python-dotenv" \
            "pytest" "pytest-cov" "httpx" "pydantic" \
            "timm>=1.0.26" "mlflow>=3.10.1" "scikit-learn" "tqdm" "typer"
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --cov=garbage_classification --cov=api --cov-report=term-missing

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
