stages:
  prepare:
    cmd: poetry run python -m garbage_classification.dataset prepare
    deps:
      - garbage_classification/dataset.py
      - data/raw/Garbage classification/Garbage classification/
    params:
      - prepare.image_extensions
    outs:
      - data/interim/cleaned/

  split:
    cmd: poetry run python -m garbage_classification.dataset split
    deps:
      - garbage_classification/dataset.py
      - data/interim/cleaned/
      - data/raw/one-indexed-files-notrash_train.txt
      - data/raw/one-indexed-files-notrash_val.txt
      - data/raw/one-indexed-files-notrash_test.txt
      - data/raw/class_mapping.csv
    params:
      - split.seed
    outs:
      - data/processed/train/
      - data/processed/val/
      - data/processed/test/

  train:
    cmd: poetry run python -m garbage_classification.modeling.train
    deps:
      - garbage_classification/modeling/train.py
      - data/processed/train/
      - data/processed/val/
    params:
      - train.epochs
      - train.batch_size
      - train.lr
      - train.model_arch
      - train.strategy
      - train.early_stopping_patience
      - train.scheduler          
      - train.warmup_epochs
    outs:
      - models/model.pth
      - models/model_metadata.json
    metrics:
      - metrics/train_metrics.json:
          cache: false

  evaluate:
    cmd: poetry run python -m garbage_classification.modeling.predict
    deps:
      - garbage_classification/modeling/predict.py
      - data/processed/test/
      - models/model.pth
      - models/model_metadata.json
    params:
      - evaluate.batch_size
    metrics:
      - metrics/eval_metrics.json:
          cache: false
    plots:
      - metrics/confusion_matrix.csv:
          cache: false
